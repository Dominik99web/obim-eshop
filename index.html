  const [expandedId, setExpandedId] = useState(null);
  const [customerType, setCustomerType] = useState(null);
  const [firmType, setFirmType] = useState(null); // 'existujuci' or 'novy'
  const [firmData, setFirmData] = useState({ nazov: "", mesto: "", ico: "", dic: "", adresa: "", psc: "", kontakt: "", email: "", telefon: "" });
  const [b2bPass, setB2bPass] = useState("");
  const [b2bError, setB2bError] = useState("");
  const [firmReady, setFirmReady] = useState(false);

  const [pickupSlot, setPickupSlot] = useState("");
  const [pieceNotes, setPieceNotes] = useState({});
  const [toast, setToast] = useState(null);
  const [formErrors, setFormErrors] = useState({});
  const [orderForm, setOrderForm] = useState({
    name: "", phone: "", email: "", address: "", city: "", zip: "",
    payment: "dobierka", note: "",
    deliveryType: "", deliveryCity: "", deliverySlot: "",
  });

  const cartCount = cart.length; // počet druhov tovaru
  const cartTotal = cart.reduce((s, i) => s + (parseFloat(String(i.qty).replace(',', '.')) || 0) * i.price, 0);
  // cartTotal defined above

  const setQty = (id, val) => setQuantities(q => ({ ...q, [id]: Math.max(1, val) }));
  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2000);
  };

  const addToCart = (product) => {
    let qty = parseFloat(String(quantities[product.id]).replace(',', '.')) || 1;
    if (product.unit === "ks") qty = Math.max(1, Math.floor(qty));
    qty = Math.round(qty * 100) / 100;
    const pieceNote = pieceNotes[product.id] || "";
    setCart(c => {
      const ex = c.find(i => i.id === product.id);
      if (ex) return c.map(i => i.id === product.id ? { ...i, qty: i.qty + qty, pieceNote: pieceNote || i.pieceNote } : i);
      return [...c, { ...product, qty, pieceNote }];
    });
    showToast(`✅ ${product.name} pridané do košíka`);
  };
  const updateCartQty = (id, qty) => {
    if (qty <= 0) setCart(c => c.filter(i => i.id !== id));
    else setCart(c => c.map(i => i.id === id ? { ...i, qty } : i));
  };

  const setField = (field, val) => setOrderForm(f => ({ ...f, [field]: val }));

  const validateEmail = (email) => {
    if (!email) return true; // email je nepovinný
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  };

  const validatePhone = (phone) => {
    const clean = phone.replace(/\s/g, '');
    return /^(\+421|\+420|0)[0-9]{9}$/.test(clean);
  };

  const submitOrder = () => {
    const errors = {};
    if (!validatePhone(orderForm.phone)) errors.phone = "Zadajte platné telefónne číslo (napr. +421 900 000 000)";
    if (orderForm.email && !validateEmail(orderForm.email)) errors.email = "Zadajte platný e-mail (napr. jan@email.sk)";
    if (Object.keys(errors).length > 0) {
      setFormErrors(errors);
      return;
    }
    setFormErrors({});
    const paymentLabel = customerType === "domacnost" ? "Hotovosť na sklade" :
      firmType === "existujuci" ? "Hotovosť / Osobitné podmienky" : "Hotovosť pri dodávke";
    const order = { id: Date.now(), date: new Date().toLocaleString("sk-SK"), items: [...cart], total: cartTotal, ...orderForm, payment: paymentLabel, customerType, firmType, firmName: firmData.nazov, firmMesto: firmData.mesto, firmICO: firmData.ico, pickupSlot, status: "Nová" };
    setOrders(o => [order, ...o]);
    setCart([]);
    setOrderForm({ name: "", phone: "", email: "", address: "", city: "", zip: "", payment: "dobierka", note: "", deliveryType: "", deliveryCity: "", deliverySlot: "" });
    setOrderDone(true);
  };

  const removeDiacritics = (str) => {
    return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
  };

  const searchTrimmed = search.trim();
  const searchActive = searchTrimmed.length >= 3;

  // Auto-switch to Všetko when searching
  const effectiveCat = searchActive ? "Všetko" : filterCat;

  const filtered = products.filter(p => {
    const catMatch = effectiveCat === "Všetko" || p.category === effectiveCat;
    if (!searchActive) return catMatch;
    const nameNorm = removeDiacritics(p.name);
    const searchNorm = removeDiacritics(searchTrimmed);
    const searchMatch = nameNorm.includes(searchNorm);
    return catMatch && searchMatch;
  });

  const selectedCitySlots = DELIVERY_CITIES.find(d => d.city === orderForm.deliveryCity)?.slots || [];

  // Auto-set sklad for domacnost
  if (customerType === "domacnost" && !orderForm.deliveryType) {
    setField("deliveryType", "sklad");
  }

  const canSubmit = orderForm.name && orderForm.phone &&

                                  onChange={e => setPieceNotes(q => ({...q, [p.id]: e.target.value}))}
                                  placeholder="alebo počet ks (napr. 10 ks)"
                                  style={{width:"100%",padding:"6px 10px",borderRadius:8,border:"1px dashed #ccc",fontSize:12,outline:"none",boxSizing:"border-box",color:C.gray,background:"#fafafa"}}
                                />
                              )}
                            </div>
                            <button 
                            style={{...S.addBtn, background: cart.find(i => i.id === p.id) ? "#15803d" : C.green}}
                            onClick={() => addToCart(p)}>
                            {cart.find(i => i.id === p.id) ? `✓ V košíku (${cart.find(i => i.id === p.id).qty} ${p.unit})` : "Pridať do košíka"}
                          </button>
                          </>
                        )}
                        <button style={{background:"none",border:"none",color:C.gray,fontSize:12,cursor:"pointer",padding:"4px 0",textAlign:"left"}} onClick={() => setExpandedId(expandedId === p.id ? null : p.id)}>
                          {expandedId === p.id ? "▲ Skryť detail" : "▼ Detail produktu"}
                        </button>
                        {expandedId === p.id && (
                          <div style={{background:C.grayLight,borderRadius:8,padding:"8px 10px",fontSize:13,color:C.dark,marginTop:2}}>
                            <div>🌍 <strong>Krajina pôvodu:</strong> {p.origin}</div>
                            <div>⭐ <strong>Trieda:</strong> {p.grade}</div>
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </>
      )}

      {/* CART */}
      )}

      {view === "cart" && (
        <div style={S.panel}>
          <div style={S.sectionTitle}>🛒 Košík</div>
          {orderDone ? (
            <div style={S.successBox}>
              <div style={{ fontSize: 56, marginBottom: 12 }}>✅</div>
              <div style={S.successTitle}>Objednávka odoslaná!</div>
              <div style={S.successText}>Ďakujeme! Budeme vás kontaktovať na zadaný telefón alebo e-mail.</div>
              <button style={{ ...S.submitBtn, maxWidth: 220, margin: "24px auto 0" }} onClick={goShop}>Späť na tovar</button>
            </div>
          ) : cart.length === 0 ? (
            <div style={S.emptyCart}>
              <div style={{ fontSize: 56, marginBottom: 12 }}>🛒</div>
              <div style={{ fontWeight: 700, fontSize: 18, marginBottom: 8 }}>Košík je prázdny</div>
              <button style={{ ...S.submitBtn, maxWidth: 200, margin: "20px auto 0" }} onClick={goShop}>Ísť nakupovať</button>
            </div>
          ) : (
            <>
              {cart.map(item => (
                <div key={item.id} style={S.cartItem}>
                  <img src={item.img} alt={item.name} style={S.cartItemImg} onError={e => { e.target.style.display = "none"; }} />
                  <div style={S.cartItemInfo}>
                    <div style={S.cartItemName}>{item.name}</div>
                    <div style={S.cartItemPrice}>{item.price.toFixed(2)} €/{item.unit}{item.pieceNote ? <span style={{color:C.orange,fontWeight:600}}> · {item.pieceNote}</span> : ""}</div>
                  </div>
                  <div style={S.qtyRow}>
                    <button style={S.qtyBtn} onClick={() => updateCartQty(item.id, item.qty - 1)}>−</button>
                    <span style={S.qtyNum}>{item.qty}</span>
                    <button style={S.qtyBtn} onClick={() => updateCartQty(item.id, item.qty + 1)}>+</button>
                  </div>
                  <div style={S.cartItemTotal}>{(item.qty * item.price).toFixed(2)} €</div>
                  <button style={S.removeBtn} onClick={() => updateCartQty(item.id, 0)}>✕</button>
                </div>
              ))}

              <div style={S.orderSummary}>
                <div style={S.totalRow}>
                  <span>Spolu</span>
                  <div style={{textAlign:"right"}}>
                    <div style={{color:C.green,fontSize:20,fontWeight:800}}>{cartTotal.toFixed(2)} €</div>
                    <div style={{fontSize:12,color:"#6b7280"}}>{customerType === "domacnost" ? "vrátane DPH" : "bez DPH"}</div>
                  </div>
                </div>

                {/* DELIVERY TYPE */}
                <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 12 }}>Spôsob prevzatia *</div>
                {customerType === "domacnost" ? (
                  <div style={{ ...S.deliveryCard, ...S.deliveryCardActive }} onClick={() => setField("deliveryType", "sklad")}>
                    <div style={S.deliveryCardTitle}>🏭 Vyzdvihnutie v sklade</div>
                    <div style={S.deliveryCardSub}>Malý Kolačín 342 · Po–Pi 9:00–13:00</div>
                  </div>
                ) : (
                  <div style={S.deliveryOptions}>
                    <div style={{ ...S.deliveryCard, ...(orderForm.deliveryType === "sklad" ? S.deliveryCardActive : {}) }} onClick={() => setField("deliveryType", "sklad")}>
                      <div style={S.deliveryCardTitle}>🏭 Vyzdvihnutie v sklade</div>
                      <div style={S.deliveryCardSub}>Príďte si osobne prevziať tovar</div>
                    </div>
                    <div style={{ ...S.deliveryCard, ...(orderForm.deliveryType === "dovoz" ? S.deliveryCardActive : {}) }} onClick={() => { setField("deliveryType", "dovoz"); setField("deliveryCity", ""); setField("deliverySlot", ""); }}>
                      <div style={S.deliveryCardTitle}>🚚 Dovoz tovaru</div>
                      <div style={S.deliveryCardSub}>Doručíme priamo k vám</div>
                    </div>
                  </div>
                )}

                {/* DOVOZ — len casove okno pre firmy, bez vyber mesta */}
                {orderForm.deliveryType === "dovoz" && customerType === "firma" && (
                  <div style={{ marginTop: 14, marginBottom: 8 }}>
                    <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 10 }}>Vyberte časové okno doručenia *</div>
                    <div style={S.slotGrid}>
                      {["5:30 - 7:00", "7:00 - 9:00", "9:00 - 12:00"].map(slot => (
                        <button key={slot} style={{ ...S.slotBtn, ...(orderForm.deliverySlot === slot ? S.slotBtnActive : {}) }} onClick={() => setField("deliverySlot", slot)}>
                          🕐 {slot}
                        </button>
                      ))}
                    </div>
                    {orderForm.deliverySlot && (
                      <div style={{ ...S.infoBox, marginTop: 10, background:"#e6f4ea", border:"1px solid #86efac", color:"#14532d" }}>
                        ✅ Požadovaný čas doručenia: <strong>{orderForm.deliverySlot}</strong>
                      </div>
                    )}
                  </div>
                )}

                {/* DOVOZ — domacnost (sklad only, no dovoz city) */}
                {orderForm.deliveryType === "dovoz" && customerType === "domacnost" && (
                  <div style={{...S.infoBox, marginTop: 10}}>
                    ⚠️ Rozvoz je dostupný len pre firemných zákazníkov. Pre domácnosti je k dispozícii vyzdvihnutie na sklade.
                  </div>
                )}

                {orderForm.deliveryType === "sklad" && (
                  <div style={{marginBottom:8}}>
                    <div style={{...S.infoBox, marginBottom:12}}>
                      📍 <strong>Nová Dubnica – Malý Kolačín 342</strong><br/>
                      🕘 Výdaj tovaru: <strong>9:00 – 13:00</strong>, Po–Pi
                    </div>
                    <div style={{fontWeight:700,fontSize:15,marginBottom:10}}>Vyberte čas vyzdvihnutia *</div>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      {PICKUP_SLOTS.map(slot => (
                        <button key={slot}
                          style={{...S.slotBtn,...(pickupSlot === slot ? S.slotBtnActive : {}), minWidth:70}}
                          onClick={() => setPickupSlot(slot)}>
                          🕘 {slot}
                        </button>
                      ))}
                    </div>
                    {pickupSlot && (
                      <div style={{...S.infoBox, marginTop:10, background:"#e6f4ea", border:"1px solid #86efac", color:"#14532d"}}>
                        ✅ Plánovaný čas vyzdvihnutia: <strong>{pickupSlot}</strong>
                      </div>
                    )}
                  </div>
                )}

                {/* KONTAKTNÉ ÚDAJE */}
                <div style={{ fontWeight: 700, fontSize: 16, margin: "20px 0 12px" }}>Kontaktné údaje</div>
                <div style={S.form}>
                  <div style={S.formRow}>
                    <div><label style={S.label}>Meno a priezvisko *</label><input style={S.input} value={orderForm.name} onChange={e => setField("name", e.target.value)} placeholder="Ján Novák" /></div>
                    <div>
                      <label style={S.label}>Telefón *</label>
                      <input style={{...S.input, borderColor: formErrors.phone ? "#dc2626" : "#e5e7eb"}} value={orderForm.phone} onChange={e => { setField("phone", e.target.value); setFormErrors(f => ({...f, phone: null})); }} placeholder="+421 900 000 000" />
                      {formErrors.phone && <div style={{color:"#dc2626",fontSize:12,marginTop:4}}>{formErrors.phone}</div>}
                    </div>
                  </div>
                  <div>
                    <label style={S.label}>E-mail</label>
                    <input style={{...S.input, borderColor: formErrors.email ? "#dc2626" : "#e5e7eb"}} value={orderForm.email} onChange={e => { setField("email", e.target.value); setFormErrors(f => ({...f, email: null})); }} placeholder="jan@email.sk" />
                    {formErrors.email && <div style={{color:"#dc2626",fontSize:12,marginTop:4}}>{formErrors.email}</div>}
                  </div>
                  {orderForm.deliveryType === "dovoz" && customerType === "firma" && firmType === "novy" && (
                    <>
                      <div><label style={S.label}>Adresa doručenia *</label><input style={S.input} value={orderForm.address} onChange={e => setField("address", e.target.value)} placeholder="Ulica a číslo" /></div>
                      <div style={S.formRow}>
                        <div><label style={S.label}>Mesto</label><input style={S.input} value={orderForm.city} onChange={e => setField("city", e.target.value)} placeholder="Trenčín" /></div>
                        <div><label style={S.label}>PSČ</label><input style={S.input} value={orderForm.zip} onChange={e => setField("zip", e.target.value)} placeholder="911 01" /></div>
                      </div>
                    </>
                  )}
                  <div>
                    <label style={S.label}>Spôsob platby</label>
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      {/* Hotovosť - vždy dostupná */}
                      <div style={{background:"#e8f5ea",borderRadius:8,padding:"11px 14px",border:"2px solid #2a7a3b"}}>
                        <div style={{fontWeight:600,fontSize:15,color:"#1a1a1a"}}>
                          {customerType === "domacnost" ? "💵 Hotovosť na sklade" : "💵 Hotovosť pri dodávke tovaru"}
                        </div>
                        <div style={{fontSize:12,color:"#6b7280",marginTop:3}}>
                          {customerType === "domacnost"
                            ? "Platba v hotovosti pri vyzdvihnutí tovaru na sklade."
                            : firmType === "existujuci"
                              ? "Platba v hotovosti pri dodávke, alebo podľa individuálnych podmienok."
                              : "Platba v hotovosti pri dodávke tovaru."}
                        </div>
                      </div>
                      {/* Karta - nedostupná */}
                      <div style={{background:"#f5f5f5",borderRadius:8,padding:"11px 14px",border:"1.5px solid #e0e0e0",opacity:0.7}}>
                        <div style={{fontWeight:600,fontSize:15,color:"#9a9a9a"}}>
                          💳 Platba kartou <span style={{fontSize:12,fontWeight:400}}>— momentálne nedostupné, pracujeme na riešení</span>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div><label style={S.label}>Poznámka k objednávke</label><textarea style={S.textarea} value={orderForm.note} onChange={e => setField("note", e.target.value)} placeholder="Napr. iné požiadavky zákazníka... (nepovinné)" /></div>
                  <button style={{ ...S.submitBtn, opacity: canSubmit ? 1 : 0.45 }} disabled={!canSubmit} onClick={submitOrder}>
                    ✅ Objednať — {cartTotal.toFixed(2)} €
                  </button>
                  {!canSubmit && <div style={{ fontSize: 12, color: C.gray, textAlign: "center" }}>Vyplňte meno, telefón a spôsob prevzatia</div>}
                </div>
              </div>
            </>
          )}
        </div>
      )}

      {/* ADMIN */}
      {view === "admin" && (
        !adminLoggedIn ? (
          <div style={S.adminLogin}>
            <div style={{ fontSize: 48, marginBottom: 12 }}>🔐</div>
            <div style={{ fontSize: 22, fontWeight: 800, marginBottom: 20 }}>Admin prístup</div>
            <label style={S.label}>Heslo</label>
            <input type="password" style={S.input} value={adminPass} onChange={e => setAdminPass(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter") { if (adminPass === ADMIN_PASSWORD) { setAdminLoggedIn(true); setAdminError(""); } else setAdminError("Nesprávne heslo"); } }}
              placeholder="Zadajte heslo" />
            {adminError && <div style={{ color: C.red, marginTop: 8, fontSize: 14 }}>{adminError}</div>}
            <button style={{ ...S.submitBtn, marginTop: 16 }} onClick={() => { if (adminPass === ADMIN_PASSWORD) { setAdminLoggedIn(true); setAdminError(""); } else setAdminError("Nesprávne heslo"); }}>Prihlásiť sa</button>
            <div style={{ marginTop: 12, fontSize: 12, color: C.gray }}>Demo heslo: admin123</div>
          </div>
        ) : (
          <div style={{ maxWidth: 1100, margin: "0 auto", padding: "32px 20px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
              <div style={S.sectionTitle}>⚙️ Admin panel</div>
              <button style={{ padding: "6px 14px", borderRadius: 6, border: "none", cursor: "pointer", background: C.redLight, color: C.red, fontWeight: 600 }} onClick={() => { setAdminLoggedIn(false); setAdminPass(""); }}>Odhlásiť</button>
            </div>
            <div style={{ display: "flex", gap: 10, marginBottom: 24 }}>
              {["orders", "products"].map(t => (
                <button key={t} style={{ ...S.navBtn, ...(adminTab === t ? { background: C.green, color: "#fff", borderColor: C.green } : { background: "#fff", color: C.green, border: `2px solid ${C.green}` }) }} onClick={() => setAdminTab(t)}>
                  {t === "orders" ? "📋 Objednávky" : "🥦 Produkty"}
                </button>
              ))}
            </div>

            {adminTab === "orders" && (
              <div style={S.adminSection}>
                <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 14 }}>Objednávky ({orders.length})</div>
                {orders.length === 0 ? (
                  <div style={{ color: C.gray, padding: "20px 0", textAlign: "center" }}>Žiadne objednávky zatiaľ.</div>
                ) : (
                  <div style={{display:"flex",flexDirection:"column",gap:16}}>
                    {orders.map(o => (
                      <div key={o.id} style={{border:"1px solid #e2e8f0",borderRadius:12,overflow:"hidden"}}>
                        {/* Order header */}
                        <div style={{background:"#f8fafc",padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                          <div style={{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
                            <div style={{fontSize:13,color:"#64748b"}}>{o.date}</div>
                            <div style={{fontWeight:700,fontSize:15}}>{o.name}</div>
                            <div style={{fontSize:13,color:"#64748b"}}>{o.phone}</div>
                            {o.email && <div style={{fontSize:13,color:"#64748b"}}>{o.email}</div>}
                            <div style={{fontSize:13}}>{o.deliveryType === "sklad" ? `🏭 Sklad ${o.pickupSlot ? "— " + o.pickupSlot : ""}` : `🚚 Dovoz — ${o.deliverySlot}`}</div>
                            <div style={{fontSize:13}}>{o.payment}</div>
                            {o.note && <div style={{fontSize:13,color:"#92400e",background:"#fffbeb",padding:"2px 8px",borderRadius:6}}>📝 {o.note}</div>}
                          </div>
                          <div style={{display:"flex",gap:8,alignItems:"center"}}>
                            <div style={{fontWeight:700,fontSize:16,color:C.dark}}>{o.total.toFixed(2)} €</div>
                            <span style={{ ...S.badge, ...(o.status === "Nová" ? S.badgeOrange : o.status === "Vybavená" ? S.badgeGreen : S.badgeGray) }}>{o.status}</span>
                            <button style={{ ...S.actionBtn, background:"#f0fdf4", color: C.green }} onClick={() => setOrders(os => os.map(x => x.id === o.id ? { ...x, status: "Vybavená" } : x))}>✓ Vybaviť</button>
                            <button style={{ ...S.actionBtn, background:"#f1f5f9", color: "#64748b" }} onClick={() => setOrders(os => os.map(x => x.id === o.id ? { ...x, status: "Zrušená" } : x))}>✕ Zrušiť</button>
                          </div>
                        </div>
                        {/* Order items */}
                        <div style={{padding:"12px 16px"}}>
                          <div style={{fontSize:12,fontWeight:600,color:"#64748b",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.5px"}}>Objednané položky:</div>
                          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(220px,1fr))",gap:6}}>
                            {o.items.map((item,i) => (
                              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 10px",background:"#f8fafc",borderRadius:8,fontSize:13}}>
                                <div>
                                  <span style={{fontWeight:600}}>{item.name}</span>
                                  {item.pieceNote && <span style={{color:"#f97316",fontSize:11,marginLeft:4}}>({item.pieceNote})</span>}
                                </div>
                                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                                  <span style={{color:"#64748b"}}>{item.qty} {item.unit}</span>
                                  <span style={{fontWeight:700}}>{(item.qty * item.price).toFixed(2)} €</span>
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {adminTab === "products" && (
              <div>
                <div style={S.adminSection}>
                  <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 14 }}>Pridať produkt</div>
                  <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "flex-end" }}>
                    <div style={{ flex: 2, minWidth: 140 }}><label style={S.label}>Názov</label><input style={S.input} value={newProduct.name} onChange={e => setNewProduct(p => ({ ...p, name: e.target.value }))} placeholder="Napr. Mango" /></div>
                    <div><label style={S.label}>Cena €</label><input style={{ ...S.input, width: 80 }} type="number" value={newProduct.price} onChange={e => setNewProduct(p => ({ ...p, price: e.target.value }))} placeholder="1.50" /></div>
                    <div><label style={S.label}>Jednotka</label>
                      <select style={{ ...S.select, width: 100 }} value={newProduct.unit} onChange={e => setNewProduct(p => ({ ...p, unit: e.target.value }))}>
                        <option>kg</option><option>ks</option><option>zväzok</option>
                      </select>
                    </div>
                    <div><label style={S.label}>Kategória</label>
                      <select style={{ ...S.select, width: 160 }} value={newProduct.category} onChange={e => setNewProduct(p => ({ ...p, category: e.target.value }))}>
                        {CATEGORIES.filter(c => c !== "Všetko").map(c => <option key={c}>{c}</option>)}
                      </select>
                    </div>
                    <div style={{ flex: 3, minWidth: 200 }}><label style={S.label}>URL fotky (Unsplash alebo vlastná)</label><input style={S.input} value={newProduct.img} onChange={e => setNewProduct(p => ({ ...p, img: e.target.value }))} placeholder="https://..." /></div>
                    <button style={{ ...S.submitBtn, width: "auto", padding: "10px 20px", marginTop: 18 }}
                      onClick={() => {
                        if (!newProduct.name || !newProduct.price) return;
                        setProducts(ps => [...ps, { ...newProduct, id: Date.now(), price: parseFloat(newProduct.price), available: true }]);
                        setNewProduct({ name: "", unit: "kg", price: "", category: "Ovocie", img: "" });
                      }}>+ Pridať</button>
                  </div>
                </div>
                <div style={S.adminSection}>
                  <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 14 }}>Správa produktov ({products.length})</div>
                  <table style={S.adminTable}>
                    <thead><tr>{["Foto", "Produkt", "Kategória", "Cena", "Dostupnosť", "Akcia"].map(h => <th key={h} style={S.th}>{h}</th>)}</tr></thead>
                    <tbody>
                      {products.map(p => (
                        <tr key={p.id}>
                          <td style={S.td}><img src={p.img} alt="" style={{ width: 40, height: 40, borderRadius: 6, objectFit: "cover" }} onError={e => { e.target.style.display = "none"; }} /></td>
                          <td style={S.td}><strong>{p.name}</strong></td>
                          <td style={S.td}>{p.category}</td>
                          <td style={S.td}>{p.price.toFixed(2)} €/{p.unit}</td>
                          <td style={S.td}><span style={{ ...S.badge, ...(p.available ? S.badgeGreen : S.badgeGray) }}>{p.available ? "Dostupné" : "Nedostupné"}</span></td>
                          <td style={S.td}>
                            <button style={{ ...S.actionBtn, background: p.available ? C.grayLight : C.greenPale, color: p.available ? C.gray : C.green }}
                              onClick={() => setProducts(ps => ps.map(x => x.id === p.id ? { ...x, available: !x.available } : x))}>
                              {p.available ? "Skryť" : "Zobraziť"}
                            </button>
                            <button style={{ ...S.actionBtn, background: C.redLight, color: C.red }}
                              onClick={() => setProducts(ps => ps.filter(x => x.id !== p.id))}>Zmazať</button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        )
      )}
    {/* TOAST NOTIFICATION */}
      {toast && (
        <div style={{
          position:"fixed", bottom:28, left:"50%", transform:"translateX(-50%)",
          background:"#1a6b2f", color:"#fff", padding:"12px 24px",
          borderRadius:12, fontSize:14, fontWeight:600,
          boxShadow:"0 4px 20px rgba(0,0,0,0.2)", zIndex:9999,
          display:"flex", alignItems:"center", gap:8,
          animation:"fadeInUp 0.2s ease"
        }}>
          {toast}
        </div>
      )}
      <style>{`
        @keyframes fadeInUp {
          from { opacity:0; transform:translate(-50%, 12px); }
          to { opacity:1; transform:translate(-50%, 0); }
        }
      `}</style>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(React.StrictMode, null, React.createElement(App)));
  </script>
</body>
</html>
